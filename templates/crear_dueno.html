{% extends "base.html" %}

{% block title %}Crear dueno | Lexora Legal{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-copy">
        <p class="eyebrow">Configuracion inicial</p>
        <h1>Crea el dueno del bufete.</h1>
        <p>Esta cuenta tendra permisos para crear abogados, ver todos los casos y ajustar asignaciones.</p>
    </div>

    <form class="card form-card" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <h2>Super usuario</h2>
        <label>
            Nombre
            <input type="text" name="nombre" placeholder="Nombre del dueno" required>
        </label>
        <label>
            Email
            <input type="email" name="email" placeholder="dueno@bufete.cl" required>
        </label>
        <label>
            Contrasena
            <input type="password" name="password" placeholder="Minimo 10 caracteres" minlength="10" autocomplete="new-password" required>
        </label>
        <button class="button primary full" type="submit">Crear dueno</button>
    </form>
</section>
{% endblock %}
