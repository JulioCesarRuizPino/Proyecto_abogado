{% extends "base.html" %}

{% block title %}Registro | Lexora Legal{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-copy">
        <p class="eyebrow">Nuevo usuario</p>
        <h1>Abre tu cuenta de cliente.</h1>
        <p>Los perfiles de abogados los crea exclusivamente la administracion del bufete.</p>
    </div>

    <form class="card form-card" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <h2>Crear cuenta</h2>
        <label>
            Nombre
            <input type="text" name="nombre" placeholder="Nombre completo" required>
        </label>
        <label>
            Email
            <input type="email" name="email" placeholder="correo@ejemplo.cl" required>
        </label>
        <label>
            Contrasena
            <input type="password" name="password" placeholder="Minimo 10 caracteres" minlength="10" autocomplete="new-password" required>
        </label>

        <button class="button primary full" type="submit">Registrarse</button>
    </form>
</section>
{% endblock %}
